        // === MAP SETUP ===
        var map = L.map('map', {
            zoomControl: true,
            attributionControl: true
        });

        var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        });

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, Maxar, Earthstar Geographics',
            maxZoom: 19
        });

        var hybrid = L.layerGroup([
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri, Maxar, Earthstar Geographics',
                maxZoom: 19
            }),
            L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }),
            L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            })
        ]).addTo(map);

        // === ALWAYS-ON LAYERS ===

        // D4 Boundary — red outline, no fill, no interaction
        var d4Boundary = L.geoJSON(DATA.d4_boundary, {
            style: { color: '#C8102E', weight: 3, fillOpacity: 0, interactive: false }
        }).addTo(map);

        // Fit map to D4 boundary
        if (DATA.d4_boundary) {
            map.fitBounds(d4Boundary.getBounds(), { padding: [20, 20] });
        } else {
            map.setView([33.48, -112.07], 12);
        }

        // Precinct overlay — toggleable, gentle fill with labels
        var precinctsLayer = L.geoJSON(DATA.precincts, {
            style: { color: '#1B2A4A', weight: 2, fillColor: '#1B2A4A', fillOpacity: 0.08 },
            onEachFeature: function(f, layer) {
                if (f.properties.precinct_name) {
                    layer.bindTooltip(f.properties.precinct_name, {
                        permanent: true,
                        direction: 'center',
                        className: 'precinct-label'
                    });
                }
            }
        });

        // === LAYER CONTROL ===
        var overlays = {
            "Precintos": precinctsLayer
        };

        var baseMaps = {
            "H\u00edbrido": hybrid,
            "Sat\u00e9lite": satellite,
            "Calles": streets
        };

        L.control.layers(baseMaps, overlays, { collapsed: false, position: 'topright' }).addTo(map);
