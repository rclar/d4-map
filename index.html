        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            background: #1B2A4A;
            padding: 8px 16px;
            height: 56px;
        }
        .header svg { height: 40px; width: auto; }

            font-size: 13px;
            border-radius: 6px;
        }
        .leaflet-control-layers-toggle {
            width: 36px;
            height: 36px;

        /* Precinct labels */
        .precinct-label {
            background: none !important;
            border: none !important;

        /* Mobile */
        @media (max-width: 600px) {

            .header svg { height: 32px; }

        // === MAP SETUP ===
        var map = L.map('map', {
            zoomControl: true,
            attributionControl: true
        });

        var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        });

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '&copy; Esri, Maxar, Earthstar Geographics',
            maxZoom: 19
        });

        var hybrid = L.layerGroup([
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri, Maxar, Earthstar Geographics',
                maxZoom: 19
            }),
            L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }),
            L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            })
        ]).addTo(map);

        // === ALWAYS-ON LAYERS ===

        // D4 Boundary — red outline, no fill, no interaction
        var d4Boundary = L.geoJSON(DATA.d4_boundary, {
            style: { color: '#C8102E', weight: 3, fillOpacity: 0, interactive: false }
        }).addTo(map);

        // Fit map to D4 boundary
        if (DATA.d4_boundary) {
            map.fitBounds(d4Boundary.getBounds(), { padding: [20, 20] });
        } else {
            map.setView([33.48, -112.07], 12);
        }

        // Precinct overlay — toggleable, gentle fill with labels
        var precinctsLayer = L.geoJSON(DATA.precincts, {
            style: { color: '#1B2A4A', weight: 2, fillColor: '#1B2A4A', fillOpacity: 0.08 },
            onEachFeature: function(f, layer) {
                if (f.properties.precinct_name) {
                    layer.bindTooltip(f.properties.precinct_name, {
                        permanent: true,
                        direction: 'center',
                        className: 'precinct-label'
                    });
                }
            }
        });

        // === TOGGLE LAYERS ===

        // 1. Parks & Rec (ON by default)
        var parksLayer = L.geoJSON(DATA.parks, {
            style: { color: '#2d8a4e', weight: 1.5, fillColor: '#2d8a4e', fillOpacity: 0.25 },
            onEachFeature: function(f, layer) {
                if (f.properties.PROPERTY_NAME) {
                    layer.bindPopup('<h3>' + f.properties.PROPERTY_NAME + '</h3><p>Park</p>');
                }
            }
        });

        var commCentersLayer = L.geoJSON(DATA.community_centers, {
            pointToLayer: function(f, latlng) {
                return L.circleMarker(latlng, { radius: 7, fillColor: '#17a2b8', color: '#fff', weight: 1.5, fillOpacity: 0.85 });
            },
            onEachFeature: function(f, layer) {
                if (f.properties.BUILDING_NAME) {
                    layer.bindPopup('<h3>' + f.properties.BUILDING_NAME + '</h3><p>Community Center</p>');
                }
            }
        });

        var librariesLayer = L.geoJSON(DATA.libraries, {
            pointToLayer: function(f, latlng) {
                return L.circleMarker(latlng, { radius: 7, fillColor: '#3b82f6', color: '#fff', weight: 1.5, fillOpacity: 0.85 });
            },
            onEachFeature: function(f, layer) {
                if (f.properties.PlaceName) {
                    layer.bindPopup('<h3>' + f.properties.PlaceName + '</h3><p>Library</p>');
                }
            }
        });

        var parksRecGroup = L.layerGroup([parksLayer, commCentersLayer, librariesLayer]).addTo(map);

        // 2. Transit (OFF by default)
        var transitBuffer = L.geoJSON(DATA.light_rail_buffer, {
            style: { color: '#60a5fa', weight: 1, fillColor: '#93c5fd', fillOpacity: 0.2, interactive: false }
        });

        var transitStops = L.geoJSON(DATA.light_rail_stops, {
            pointToLayer: function(f, latlng) {
                return L.circleMarker(latlng, { radius: 6, fillColor: '#2563eb', color: '#fff', weight: 1.5, fillOpacity: 0.9 });
            },
            onEachFeature: function(f, layer) {
                if (f.properties.LOCATION) {
                    layer.bindPopup('<h3>' + f.properties.LOCATION + '</h3><p>Light Rail Stop</p>');
                }
            }
        });

        var transitGroup = L.layerGroup([transitBuffer, transitStops]);

        // 3. Schools (OFF by default)
        var schoolsLayer = L.geoJSON(DATA.schools, {
            pointToLayer: function(f, latlng) {
                return L.circleMarker(latlng, { radius: 5, fillColor: '#f59e0b', color: '#fff', weight: 1.5, fillOpacity: 0.85 });
            },
            onEachFeature: function(f, layer) {
                var name = f.properties.school_name || '';
                var type = f.properties.is_charter ? 'Charter' : 'Public';
                var level = f.properties.school_level || '';
                layer.bindPopup('<h3>' + name + '</h3><p>' + type + (level ? ' \u2022 ' + level : '') + '</p>');
            }
        });


        // 5. Neighborhood Associations (OFF by default)
        var neighborhoodsLayer = L.geoJSON(DATA.neighborhoods, {
            style: { color: '#8b5cf6', weight: 2, fillColor: '#8b5cf6', fillOpacity: 0.08 },
            onEachFeature: function(f, layer) {
                var name = f.properties.NAME || '';
                var type = f.properties.ASSOC_TYPE || '';
                layer.bindPopup('<h3>' + name + '</h3>' + (type ? '<p>' + type + '</p>' : ''));
            }
        });

        // === LAYER CONTROL ===
        var overlays = {
            "Precincts": precinctsLayer,
            "Parks & Rec": parksRecGroup,
            "Light Rail": transitGroup,
            "Schools": schoolsLayer,

            "Neighborhoods": neighborhoodsLayer
        };

        var baseMaps = {
            "Hybrid": hybrid,
            "Satellite": satellite,
            "Streets": streets
        };

        L.control.layers(baseMaps, overlays, { collapsed: false, position: 'topright' }).addTo(map);
    </script>
